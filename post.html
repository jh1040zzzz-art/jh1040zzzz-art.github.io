<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결핍과 문학</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --paper: #efe9df; --ink: #1c1a17; --ink-soft: #4a453e; --void: #0e0d0b; --gap-red: #9c3b2e; }
  body { background: var(--void); color: var(--paper); font-family: 'Noto Serif KR', serif; min-height: 100vh; }

  #lock-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8vw;
    text-align: center;
  }
  #lock-screen h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.5rem;
    margin-bottom: 2rem;
  }
  #lock-screen input {
    width: 100%;
    max-width: 280px;
    padding: 0.8rem 1rem;
    background: transparent;
    border: 1px solid rgba(239,233,223,0.4);
    color: var(--paper);
    font-size: 1rem;
    text-align: center;
    outline: none;
    font-family: 'Noto Serif KR', serif;
  }
  #lock-screen input:focus { border-color: var(--gap-red); }
  #lock-screen button {
    margin-top: 1.2rem;
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid var(--paper);
    color: var(--paper);
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  #lock-screen button:hover { background: var(--paper); color: var(--void); }
  #error-msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--gap-red);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  #error-msg.show { opacity: 1; }

  #content {
    display: none;
    max-width: 720px;
    margin: 0 auto;
    padding: 8vh 8vw 12vh;
  }
  #content.show { display: block; }

  .back-link {
    display: inline-block;
    margin-bottom: 3rem;
    font-size: 0.85rem;
    color: rgba(239,233,223,0.5);
    text-decoration: none;
    border-bottom: 1px solid rgba(239,233,223,0.25);
    padding-bottom: 2px;
  }
  .back-link:hover { color: var(--paper); border-color: var(--paper); }

  #post-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.7rem;
    line-height: 1.4;
    margin-bottom: 0.6rem;
    word-break: keep-all;
    overflow-wrap: anywhere;
  }
  #post-meta {
    font-size: 0.85rem;
    color: rgba(239,233,223,0.5);
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(239,233,223,0.15);
  }
  #post-body {
    font-weight: 300;
    font-size: 1rem;
    line-height: 2;
    color: rgba(239,233,223,0.9);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .not-found {
    color: rgba(239,233,223,0.5);
    font-size: 0.95rem;
  }
</style>
</head>
<body>

<div id="lock-screen">
  <h1>비공개 페이지</h1>
  <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="off">
  <br>
  <button onclick="checkPassword()">입장</button>
  <div id="error-msg">비밀번호가 틀렸습니다</div>
</div>

<div id="content">
  <a class="back-link" href="secret.html">← 목록으로</a>
  <div id="post-title"></div>
  <div id="post-meta"></div>
  <div id="post-body"></div>
</div>

<script>
  const PASSWORD = "howdidyouknow";

  function checkPassword() {
    const input = document.getElementById('pw-input').value;
    if (input === PASSWORD) {
      sessionStorage.setItem('gyeolmun_auth', '1');
      enter();
    } else {
      document.getElementById('error-msg').classList.add('show');
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function enter() {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('content').classList.add('show');
    loadPost();
  }

  // secret.html에서 이미 인증했다면 다시 비밀번호 안 물어봄
  if (sessionStorage.getItem('gyeolmun_auth') === '1') {
    enter();
  }

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function loadPost() {
    const idParam = getParam('id');
    const indexParam = getParam('index');

    fetch('posts.json?_=' + Date.now())
      .then(r => r.json())
      .then(posts => {
        let post = null;
        if (idParam) {
          post = posts.find(p => p.id === idParam);
        } else if (indexParam !== null) {
          post = posts[Number(indexParam)];
        }

        if (!post) {
          document.getElementById('post-title').textContent = '글을 찾을 수 없습니다';
          document.getElementById('post-body').innerHTML = '<div class="not-found">삭제되었거나 존재하지 않는 글입니다.</div>';
          return;
        }

        document.title = post.title + ' · 결핍과 문학';
        document.getElementById('post-title').textContent = post.title || '(제목 없음)';
        const authorLine = post.author ? (post.author + ' · ') : '';
        document.getElementById('post-meta').textContent = authorLine + (post.date || '');
        document.getElementById('post-body').textContent = post.content || '';
      })
      .catch(() => {
        document.getElementById('post-title').textContent = '불러오기 실패';
      });
  }
</script>

</body>
</html>
