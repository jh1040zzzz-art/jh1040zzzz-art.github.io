<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 결핍과 문학</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0c0a;
    --ink:#ece7db;
    --sub:#8f8a7c;
    --accent:#9c3b2e;
    --accent-soft:#c96b57;
    --line:#3a352c;
    --field-bg:#1a1712;
    --field-border:#3a352c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Serif KR', serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.7;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:48px 24px 100px;
  }
  h1{
    font-family:'Nanum Myeongjo', serif;
    font-weight:800;
    font-size:30px;
    margin:0 0 12px;
  }
  .warning{
    color:var(--sub);
    font-size:14px;
    margin:0 0 40px;
  }
  .token-box{
    border:1px dashed var(--line);
    padding:24px;
    margin-bottom:20px;
  }
  .token-box p{
    color:var(--ink);
    font-size:15px;
    margin:0 0 18px;
  }
  .token-box label{
    font-size:13px;
    color:var(--sub);
    margin:14px 0 6px;
  }
  label{
    display:block;
    font-size:15px;
    color:var(--ink);
    margin:0 0 10px;
  }
  label.optional::after{
    content:" (선택)";
    color:var(--sub);
    font-size:13px;
  }
  input[type="text"], input[type="password"], textarea, select{
    width:100%;
    padding:14px 16px;
    font-family:'Noto Serif KR', serif;
    font-size:15px;
    border:1px solid var(--field-border);
    border-radius:2px;
    background:var(--field-bg);
    color:var(--ink);
  }
  input::placeholder, textarea::placeholder{
    color:#6a6558;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  textarea{
    min-height:260px;
    resize:vertical;
  }
  .field{
    margin-bottom:28px;
  }
  select{
    appearance:none;
    -webkit-appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sub) 50%), linear-gradient(135deg, var(--sub) 50%, transparent 50%);
    background-position: calc(100% - 20px) center, calc(100% - 15px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
  }
  button{
    font-family:'Nanum Myeongjo', serif;
    font-size:16px;
    border:none;
    border-radius:2px;
    padding:16px 28px;
    cursor:pointer;
  }
  .btn-save{
    background:var(--accent);
    color:#fff;
  }
  .btn-save:hover{ background:#82301f; }
  .btn-logout{
    background:transparent;
    color:var(--sub);
    border:1px solid var(--line);
    padding:16px 28px;
    font-size:15px;
  }
  .btn-logout:hover{ border-color:var(--accent-soft); color:var(--accent-soft); }
  .token-btn-row{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap:wrap;
  }
  .btn-publish{
    background:var(--accent);
    color:#fff;
    width:100%;
    padding:18px;
    font-size:17px;
    margin-top:8px;
  }
  .btn-publish:hover{ background:#82301f; }
  .btn-publish:disabled{ background:#5a2d26; cursor:not-allowed; }
  .status{
    font-size:14px;
    margin-top:14px;
  }
  .status.ok{ color:#7fae7f; }
  .status.err{ color:var(--accent-soft); }
  .divider{
    border:none;
    border-top:1px solid var(--line);
    margin:56px 0 32px;
  }
  .list-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .list-header h2{
    font-family:'Nanum Myeongjo', serif;
    font-size:17px;
    font-weight:700;
    margin:0;
  }
  .refresh-link{
    font-size:13px;
    color:var(--sub);
    cursor:pointer;
    text-decoration:underline;
  }
  .refresh-link:hover{ color:var(--ink); }
  .empty{
    color:var(--sub);
    font-size:15px;
  }
  .post-item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    padding:18px 0;
    border-bottom:1px solid var(--line);
  }
  .post-item:last-child{ border-bottom:none; }
  .post-meta{ flex:1; min-width:0; }
  .post-title{
    font-weight:600;
    font-size:16px;
    margin:0 0 6px;
    word-break:break-word;
    color:var(--ink);
  }
  .post-sub{
    font-size:13px;
    color:var(--sub);
  }
  .post-sub.me{
    color:var(--accent-soft);
  }
  .post-actions{
    flex-shrink:0;
  }
  .btn-danger{
    background:transparent;
    color:var(--accent-soft);
    border:1px solid var(--accent-soft);
    padding:8px 14px;
    font-size:13px;
  }
  .btn-danger:hover{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-cancel{
    background:transparent;
    color:var(--sub);
    border:1px solid var(--line);
    padding:8px 14px;
    font-size:13px;
  }
  .btn-cancel:hover{ border-color:var(--sub); color:var(--ink); }
  .confirm-box{
    background:#1e1512;
    border:1px solid var(--accent);
    padding:16px;
    border-radius:2px;
    margin-top:12px;
    font-size:14px;
    color:var(--ink);
  }
  .confirm-box .confirm-actions{
    margin-top:12px;
    display:flex;
    gap:10px;
  }
  .locked-banner{
    border:1px solid var(--accent);
    background:#1e1512;
    padding:16px;
    font-size:14px;
    margin-bottom:20px;
  }
  .sub-preview{
    font-size:14px;
    color:rgba(236,231,220,0.7);
    margin-top:10px;
    line-height:1.6;
    max-height:4.8em;
    overflow:hidden;
    word-break:break-word;
    overflow-wrap:anywhere;
  }
  .tier-tag{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:2px;
    margin-left:8px;
    vertical-align:middle;
  }
  .tier-tag.blocked{ background:#3a1512; color:var(--accent-soft); border:1px solid var(--accent); }
  .tier-tag.normal{ background:#1a1712; color:var(--sub); border:1px solid var(--line); }
  .tier-tag.trusted{ background:#16261a; color:#7fae7f; border:1px solid #3a5c3f; }
  .tier-btn-row{
    display:flex;
    gap:6px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .tier-btn{
    background:transparent;
    border:1px solid var(--line);
    color:var(--sub);
    padding:6px 12px;
    font-size:12px;
  }
  .tier-btn.active{
    border-color:var(--accent-soft);
    color:var(--accent-soft);
  }
  .tier-btn:hover{ border-color:var(--accent-soft); color:var(--accent-soft); }
  .approve-btn{
    background:transparent;
    color:#7fae7f;
    border:1px solid #3a5c3f;
    padding:8px 14px;
    font-size:13px;
  }
  .approve-btn:hover{ background:#264a2e; color:#fff; }
</style>
</head>
<body>

<main>
  <h1>관리자 · 글쓰기</h1>
  <p class="warning">이 페이지 주소는 아무에게도 공유하지 마세요.</p>

  <div id="locked-banner" class="locked-banner" style="display:none;"></div>

  <!-- 토큰 입력 -->
  <div class="token-box">
    <p>최초 1회, GitHub Personal Access Token을 입력하세요. 이 브라우저에만 저장되며 서버로 전송되지 않습니다.</p>
    <div class="field" style="margin-bottom:12px;">
      <input type="password" id="pat-input" placeholder="ghp_...">
    </div>
    <label for="device-label">이 기기 이름</label>
    <input type="text" id="device-label" placeholder="예: 집 컴퓨터, 도서관 PC">
    <div class="token-btn-row">
      <button class="btn-save" id="save-token-btn">저장</button>
      <button class="btn-logout" id="logout-btn" style="display:none;">이 기기 로그아웃</button>
    </div>
    <div class="status" id="token-status"></div>
  </div>

  <!-- 인증 전에는 숨겨지는 영역 -->
  <div id="locked-placeholder" class="empty" style="margin-top:8px;">토큰을 입력하고 저장하면 글쓰기 및 관리 화면이 열립니다.</div>

  <div id="authed-area" style="display:none;">

    <!-- 글쓰기 -->
    <div class="field">
      <label for="post-target">올릴 곳</label>
      <select id="post-target">
        <option value="outside">공식 간행물 외</option>
      </select>
    </div>

    <div class="field">
      <label for="post-title">제목</label>
      <input type="text" id="post-title" placeholder="글 제목">
    </div>

    <div class="field">
      <label for="post-author" class="optional">글쓴이</label>
      <input type="text" id="post-author" placeholder="이름 또는 필명">
    </div>

    <div class="field">
      <label for="post-content">내용</label>
      <textarea id="post-content" placeholder="여기에 글을 붙여넣거나 작성하세요"></textarea>
    </div>

    <button class="btn-publish" id="publish-btn">발행하기</button>
    <div class="status" id="publish-status"></div>

    <hr class="divider">

    <!-- 글 목록 / 삭제 -->
    <div class="list-header">
      <h2>발행된 글</h2>
      <span class="refresh-link" id="refresh-posts-link">새로고침</span>
    </div>
    <div id="post-list">
      <div class="empty">불러오는 중…</div>
    </div>

    <hr class="divider">

    <!-- 인증된 기기 목록 -->
    <div class="list-header">
      <h2>인증된 기기</h2>
      <span class="refresh-link" id="refresh-devices-link">새로고침</span>
    </div>
    <div id="device-list">
      <div class="empty">불러오는 중…</div>
    </div>

    <hr class="divider">

    <!-- 비공개 페이지 비밀번호 관리 -->
    <div class="list-header">
      <h2>비공개 열람 비밀번호</h2>
    </div>
    <div class="field">
      <label for="secret-password-input" class="optional">공식 간행물 외 페이지 입장 비밀번호</label>
      <input type="text" id="secret-password-input" placeholder="불러오는 중…">
    </div>
    <button class="btn-save" id="save-password-btn">비밀번호 저장</button>
    <div class="status" id="password-status"></div>

    <hr class="divider">

    <!-- 투고함 -->
    <div class="list-header">
      <h2>투고함</h2>
      <span class="refresh-link" id="refresh-submissions-link">새로고침</span>
    </div>
    <button class="btn-save" id="bulk-approve-btn" style="margin-bottom:16px;">연재작가 글 일괄 발행</button>
    <div class="status" id="bulk-approve-status"></div>
    <div id="submission-list">
      <div class="empty">불러오는 중…</div>
    </div>

    <hr class="divider">

    <!-- 계정 관리 -->
    <div class="list-header">
      <h2>계정 관리</h2>
      <span class="refresh-link" id="refresh-accounts-link">새로고침</span>
    </div>
    <div id="account-list">
      <div class="empty">불러오는 중…</div>
    </div>

  </div>
</main>

<script>
const REPO_OWNER = "jh1040zzzz-art";
const REPO_NAME = "jh1040zzzz-art.github.io";
const POSTS_PATH = "posts.json";
const SESSIONS_PATH = "sessions.json";
const CONFIG_PATH = "config.json";
const ACCOUNTS_PATH = "accounts.json";
const SUBMISSIONS_PATH = "submissions.json";
const POSTS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${POSTS_PATH}`;
const SESSIONS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${SESSIONS_PATH}`;
const CONFIG_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}`;
const ACCOUNTS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${ACCOUNTS_PATH}`;
const SUBMISSIONS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${SUBMISSIONS_PATH}`;

const patInput = document.getElementById('pat-input');
const deviceLabelInput = document.getElementById('device-label');
const tokenStatus = document.getElementById('token-status');
const saveTokenBtn = document.getElementById('save-token-btn');
const logoutBtn = document.getElementById('logout-btn');
const lockedBanner = document.getElementById('locked-banner');

const postList = document.getElementById('post-list');
const refreshPostsLink = document.getElementById('refresh-posts-link');
const publishBtn = document.getElementById('publish-btn');
const publishStatus = document.getElementById('publish-status');

const deviceList = document.getElementById('device-list');
const refreshDevicesLink = document.getElementById('refresh-devices-link');

const authedArea = document.getElementById('authed-area');
const lockedPlaceholder = document.getElementById('locked-placeholder');

const secretPasswordInput = document.getElementById('secret-password-input');
const savePasswordBtn = document.getElementById('save-password-btn');
const passwordStatus = document.getElementById('password-status');

const submissionList = document.getElementById('submission-list');
const refreshSubmissionsLink = document.getElementById('refresh-submissions-link');
const bulkApproveBtn = document.getElementById('bulk-approve-btn');
const bulkApproveStatus = document.getElementById('bulk-approve-status');

const accountList = document.getElementById('account-list');
const refreshAccountsLink = document.getElementById('refresh-accounts-link');

// ---------- 기본 유틸 ----------

function getToken(){
  return localStorage.getItem('gh_pat') || '';
}

function getDeviceId(){
  let id = localStorage.getItem('device_id');
  if(!id){
    id = (crypto.randomUUID ? crypto.randomUUID() : ('dev-' + Math.random().toString(36).slice(2) + Date.now()));
    localStorage.setItem('device_id', id);
  }
  return id;
}

function getDeviceLabel(){
  return localStorage.getItem('device_label') || '';
}

function clearLocalAuth(){
  localStorage.removeItem('gh_pat');
  localStorage.removeItem('device_label');
  // device_id는 남겨둠 — 같은 기기로 재인증할 때 같은 항목을 이어서 씀
}

function setTokenStatus(msg, ok){
  tokenStatus.textContent = msg;
  tokenStatus.className = 'status ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
}

function updateAuthUI(){
  const token = getToken();
  if(token){
    logoutBtn.style.display = 'inline-block';
    saveTokenBtn.textContent = '갱신';
    patInput.value = token;
    deviceLabelInput.value = getDeviceLabel();
    setTokenStatus('저장됨', true);
  }else{
    logoutBtn.style.display = 'none';
    saveTokenBtn.textContent = '저장';
  }
}

function showLockedBanner(msg){
  lockedBanner.style.display = 'block';
  lockedBanner.textContent = msg;
}
function hideLockedBanner(){
  lockedBanner.style.display = 'none';
  lockedBanner.textContent = '';
}

function openAuthedArea(){
  authedArea.style.display = 'block';
  lockedPlaceholder.style.display = 'none';
}
function closeAuthedArea(){
  authedArea.style.display = 'none';
  lockedPlaceholder.style.display = 'block';
}

// ---------- GitHub API 공통 ----------

async function ghGet(url){
  const token = getToken();
  const headers = { 'Accept': 'application/vnd.github+json' };
  if(token) headers['Authorization'] = `token ${token}`;
  const res = await fetch(url, { headers });
  if(res.status === 404) return null; // 파일이 아직 없음
  if(!res.ok) throw new Error('FETCH_FAILED_' + res.status);
  return res.json();
}

async function ghPut(url, contentObj, sha, message){
  const token = getToken();
  if(!token) throw new Error('NO_TOKEN');
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(contentObj, null, 2))));
  const body = { message, content: encoded };
  if(sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github+json'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error('SAVE_FAILED_' + res.status);
  return res.json();
}

function decodeContent(data){
  if(!data) return { list: [], sha: null };
  const content = decodeURIComponent(escape(atob(data.content)));
  return { list: JSON.parse(content || '[]'), sha: data.sha };
}

async function fetchPosts(){
  const data = await ghGet(POSTS_API);
  return decodeContent(data);
}
async function savePosts(posts, sha, message){
  return ghPut(POSTS_API, posts, sha, message);
}
async function fetchSessions(){
  const data = await ghGet(SESSIONS_API);
  return decodeContent(data);
}
async function saveSessions(sessions, sha, message){
  return ghPut(SESSIONS_API, sessions, sha, message);
}

async function fetchConfig(){
  const data = await ghGet(CONFIG_API);
  if(!data) return { config: { secretPassword: '' }, sha: null };
  const content = decodeURIComponent(escape(atob(data.content)));
  const config = JSON.parse(content || '{}');
  return { config, sha: data.sha };
}
async function saveConfig(config, sha, message){
  return ghPut(CONFIG_API, config, sha, message);
}

async function fetchAccounts(){
  const data = await ghGet(ACCOUNTS_API);
  return decodeContent(data);
}
async function saveAccounts(accounts, sha, message){
  return ghPut(ACCOUNTS_API, accounts, sha, message);
}
async function fetchSubmissions(){
  const data = await ghGet(SUBMISSIONS_API);
  return decodeContent(data);
}
async function saveSubmissions(subs, sha, message){
  return ghPut(SUBMISSIONS_API, subs, sha, message);
}

// ---------- 기기 인증 체크 ----------

// 발행/삭제 직전에 호출. 이 기기가 세션 목록에 살아있는지 확인.
async function ensureDeviceAuthorized(){
  const token = getToken();
  if(!token) throw new Error('NO_TOKEN');

  const { list: sessions } = await fetchSessions();
  const deviceId = getDeviceId();
  const mine = sessions.find(s => s.id === deviceId);

  if(!mine){
    clearLocalAuth();
    updateAuthUI();
    closeAuthedArea();
    showLockedBanner('이 기기의 인증이 해제되었습니다. 토큰을 다시 입력해주세요.');
    throw new Error('DEVICE_REVOKED');
  }
  hideLockedBanner();
  return true;
}

// 토큰 저장 시 기기를 세션 목록에 등록/갱신
async function registerDevice(label){
  const deviceId = getDeviceId();
  const { list: sessions, sha } = await fetchSessions();
  const now = new Date().toISOString();
  const existing = sessions.find(s => s.id === deviceId);
  if(existing){
    existing.label = label || existing.label || '이름 없는 기기';
    existing.lastUsed = now;
  }else{
    sessions.push({
      id: deviceId,
      label: label || '이름 없는 기기',
      addedAt: now,
      lastUsed: now
    });
  }
  await saveSessions(sessions, sha, `기기 등록: ${label || deviceId}`);
  localStorage.setItem('device_label', label || '');
}

// ---------- 초기화 ----------

window.addEventListener('DOMContentLoaded', async () => {
  updateAuthUI();
  const token = getToken();
  if(!token){
    closeAuthedArea();
    return;
  }
  // 토큰이 저장돼 있어도, 이 기기가 아직 세션 목록에 살아있는지 먼저 확인
  setTokenStatus('확인 중…');
  try{
    await ensureDeviceAuthorized();
    openAuthedArea();
    setTokenStatus('저장됨', true);
    loadPosts();
    loadDevices();
    loadSecretPassword();
    loadSubmissions();
    loadAccounts();
  }catch(err){
    closeAuthedArea();
    if(err.message === 'DEVICE_REVOKED'){
      setTokenStatus('', null);
    }else{
      setTokenStatus(`확인 실패 (${err.message})`, false);
    }
  }
});

saveTokenBtn.addEventListener('click', async () => {
  const val = patInput.value.trim();
  const label = deviceLabelInput.value.trim();
  if(!val){ setTokenStatus('토큰을 입력해주세요.', false); return; }

  saveTokenBtn.disabled = true;
  setTokenStatus('등록 중…');
  localStorage.setItem('gh_pat', val); // registerDevice가 이 토큰을 바로 씀

  try{
    await registerDevice(label);
    hideLockedBanner();
    updateAuthUI();
    openAuthedArea();
    setTokenStatus('저장 및 기기 등록 완료', true);
    loadPosts();
    loadDevices();
    loadSecretPassword();
    loadSubmissions();
    loadAccounts();
  }catch(err){
    clearLocalAuth();
    updateAuthUI();
    closeAuthedArea();
    setTokenStatus(`등록 실패 (${err.message}). 토큰 권한을 확인해주세요.`, false);
  }finally{
    saveTokenBtn.disabled = false;
  }
});

logoutBtn.addEventListener('click', async () => {
  const deviceId = getDeviceId();
  try{
    const { list: sessions, sha } = await fetchSessions();
    const filtered = sessions.filter(s => s.id !== deviceId);
    if(filtered.length !== sessions.length){
      await saveSessions(filtered, sha, '기기 로그아웃');
    }
  }catch(err){
    // 세션 파일 접근 실패해도 로컬 로그아웃은 진행
  }
  clearLocalAuth();
  patInput.value = '';
  deviceLabelInput.value = '';
  updateAuthUI();
  closeAuthedArea();
  setTokenStatus('로그아웃되었습니다.', true);
});

// ---------- 글 목록 ----------

refreshPostsLink.addEventListener('click', loadPosts);

async function loadPosts(){
  postList.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const { list: posts } = await fetchPosts();
    if(!posts.length){
      postList.innerHTML = '<div class="empty">아직 올린 글이 없습니다.</div>';
      return;
    }
    postList.innerHTML = '';
    posts.slice().reverse().forEach((post) => {
      const originalIndex = posts.indexOf(post);
      const item = document.createElement('div');
      item.className = 'post-item';
      item.innerHTML = `
        <div class="post-meta">
          <p class="post-title">${escapeHtml(post.title || '(제목 없음)')}</p>
          <p class="post-sub">${escapeHtml(post.author || '익명')} · ${escapeHtml(post.date || '')}</p>
        </div>
        <div class="post-actions">
          <button class="btn-danger" data-index="${originalIndex}">삭제</button>
        </div>
      `;
      postList.appendChild(item);
    });
    postList.querySelectorAll('.btn-danger').forEach(btn => {
      btn.addEventListener('click', () => confirmDeletePost(btn));
    });
  }catch(err){
    postList.innerHTML = `<div class="empty">불러오기 실패 (${err.message})</div>`;
  }
}

function confirmDeletePost(btn){
  if(btn.closest('.post-item').querySelector('.confirm-box')) return;
  const box = document.createElement('div');
  box.className = 'confirm-box';
  box.innerHTML = `
    정말 이 글을 삭제할까요? 이 작업은 되돌릴 수 없습니다.
    <div class="confirm-actions">
      <button class="btn-danger" id="confirm-yes">삭제 확정</button>
      <button class="btn-cancel" id="confirm-no">취소</button>
    </div>
  `;
  btn.closest('.post-item').appendChild(box);
  box.querySelector('#confirm-no').addEventListener('click', () => box.remove());
  box.querySelector('#confirm-yes').addEventListener('click', () => deletePost(btn.dataset.index, box));
}

async function deletePost(index, box){
  box.innerHTML = '확인 중…';
  try{
    await ensureDeviceAuthorized();
    box.innerHTML = '삭제 중…';
    const { list: posts, sha } = await fetchPosts();
    const idx = Number(index);
    if(idx < 0 || idx >= posts.length){
      box.innerHTML = '이미 삭제되었거나 목록이 변경되었습니다. 새로고침 해주세요.';
      return;
    }
    const removedTitle = posts[idx].title || '(제목 없음)';
    posts.splice(idx, 1);
    await savePosts(posts, sha, `삭제: ${removedTitle}`);
    loadPosts();
  }catch(err){
    if(err.message === 'DEVICE_REVOKED'){
      box.remove();
    }else{
      box.innerHTML = `삭제 실패 (${err.message}). 다시 시도해주세요.`;
    }
  }
}

// ---------- 글 발행 ----------

publishBtn.addEventListener('click', async () => {
  const title = document.getElementById('post-title').value.trim();
  const author = document.getElementById('post-author').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const target = document.getElementById('post-target').value;

  if(!title || !content){
    publishStatus.textContent = '제목과 내용을 입력해주세요.';
    publishStatus.className = 'status err';
    return;
  }

  publishBtn.disabled = true;
  publishStatus.textContent = '확인 중…';
  publishStatus.className = 'status';

  try{
    await ensureDeviceAuthorized();
    publishStatus.textContent = '발행 중…';

    const { list: posts, sha } = await fetchPosts();
    const newPost = {
      id: (crypto.randomUUID ? crypto.randomUUID() : ('p_' + Date.now() + '_' + Math.random().toString(36).slice(2))),
      title,
      author: author || '익명',
      content,
      room: target,
      date: new Date().toISOString().slice(0,10)
    };
    posts.push(newPost);
    await savePosts(posts, sha, `발행: ${title}`);

    publishStatus.textContent = '발행되었습니다.';
    publishStatus.className = 'status ok';
    document.getElementById('post-title').value = '';
    document.getElementById('post-author').value = '';
    document.getElementById('post-content').value = '';
    loadPosts();
  }catch(err){
    if(err.message === 'DEVICE_REVOKED'){
      publishStatus.textContent = '';
    }else{
      publishStatus.textContent = `발행 실패 (${err.message})`;
      publishStatus.className = 'status err';
    }
  }finally{
    publishBtn.disabled = false;
  }
});

// ---------- 인증된 기기 목록 ----------

refreshDevicesLink.addEventListener('click', loadDevices);

async function loadDevices(){
  deviceList.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const { list: sessions } = await fetchSessions();
    if(!sessions.length){
      deviceList.innerHTML = '<div class="empty">등록된 기기가 없습니다.</div>';
      return;
    }
    const myId = getDeviceId();
    deviceList.innerHTML = '';
    sessions.slice().reverse().forEach((s) => {
      const originalIndex = sessions.indexOf(s);
      const isMe = s.id === myId;
      const item = document.createElement('div');
      item.className = 'post-item';
      item.innerHTML = `
        <div class="post-meta">
          <p class="post-title">${escapeHtml(s.label || '이름 없는 기기')}</p>
          <p class="post-sub ${isMe ? 'me' : ''}">${isMe ? '현재 이 기기 · ' : ''}등록일 ${escapeHtml((s.addedAt || '').slice(0,10))}</p>
        </div>
        <div class="post-actions">
          <button class="btn-danger" data-index="${originalIndex}">삭제</button>
        </div>
      `;
      deviceList.appendChild(item);
    });
    deviceList.querySelectorAll('.btn-danger').forEach(btn => {
      btn.addEventListener('click', () => confirmDeleteDevice(btn));
    });
  }catch(err){
    deviceList.innerHTML = `<div class="empty">불러오기 실패 (${err.message})</div>`;
  }
}

function confirmDeleteDevice(btn){
  if(btn.closest('.post-item').querySelector('.confirm-box')) return;
  const box = document.createElement('div');
  box.className = 'confirm-box';
  box.innerHTML = `
    이 기기의 인증을 해제할까요? 해당 기기는 다음 발행/삭제 시도 시 다시 토큰을 입력해야 합니다.
    <div class="confirm-actions">
      <button class="btn-danger" id="confirm-yes">해제 확정</button>
      <button class="btn-cancel" id="confirm-no">취소</button>
    </div>
  `;
  btn.closest('.post-item').appendChild(box);
  box.querySelector('#confirm-no').addEventListener('click', () => box.remove());
  box.querySelector('#confirm-yes').addEventListener('click', () => deleteDevice(btn.dataset.index, box));
}

async function deleteDevice(index, box){
  box.innerHTML = '처리 중…';
  try{
    const { list: sessions, sha } = await fetchSessions();
    const idx = Number(index);
    if(idx < 0 || idx >= sessions.length){
      box.innerHTML = '이미 변경되었습니다. 새로고침 해주세요.';
      return;
    }
    const removed = sessions[idx];
    sessions.splice(idx, 1);
    await saveSessions(sessions, sha, `기기 해제: ${removed.label || removed.id}`);

    // 내가 지금 쓰는 기기 자신을 지웠다면 즉시 로컬 로그아웃
    if(removed.id === getDeviceId()){
      clearLocalAuth();
      updateAuthUI();
    }
    loadDevices();
  }catch(err){
    box.innerHTML = `처리 실패 (${err.message}). 다시 시도해주세요.`;
  }
}

// ---------- 비공개 열람 비밀번호 ----------

async function loadSecretPassword(){
  secretPasswordInput.placeholder = '불러오는 중…';
  try{
    const { config } = await fetchConfig();
    secretPasswordInput.value = config.secretPassword || '';
    secretPasswordInput.placeholder = '비밀번호';
  }catch(err){
    secretPasswordInput.placeholder = '불러오기 실패';
  }
}

savePasswordBtn.addEventListener('click', async () => {
  const newPassword = secretPasswordInput.value.trim();
  if(!newPassword){
    passwordStatus.textContent = '비밀번호를 입력해주세요.';
    passwordStatus.className = 'status err';
    return;
  }
  savePasswordBtn.disabled = true;
  passwordStatus.textContent = '확인 중…';
  passwordStatus.className = 'status';
  try{
    await ensureDeviceAuthorized();
    passwordStatus.textContent = '저장 중…';
    const { config, sha } = await fetchConfig();
    config.secretPassword = newPassword;
    await saveConfig(config, sha, '비공개 열람 비밀번호 변경');
    passwordStatus.textContent = '저장되었습니다. 이 비밀번호로 다음 발행부터 확인 가능합니다.';
    passwordStatus.className = 'status ok';
  }catch(err){
    if(err.message === 'DEVICE_REVOKED'){
      passwordStatus.textContent = '';
    }else{
      passwordStatus.textContent = `저장 실패 (${err.message})`;
      passwordStatus.className = 'status err';
    }
  }finally{
    savePasswordBtn.disabled = false;
  }
});

// ---------- 투고함 ----------

refreshSubmissionsLink.addEventListener('click', loadSubmissions);

let _accountsCache = [];

async function loadSubmissions(){
  submissionList.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const [{ list: subs }, { list: accounts }] = await Promise.all([fetchSubmissions(), fetchAccounts()]);
    _accountsCache = accounts;
    if(!subs.length){
      submissionList.innerHTML = '<div class="empty">투고함이 비어 있습니다.</div>';
      return;
    }
    submissionList.innerHTML = '';
    subs.forEach((sub) => {
      const acc = accounts.find(a => a.username === sub.username);
      const tier = acc ? acc.tier : 'normal';
      const item = document.createElement('div');
      item.className = 'post-item';
      item.style.flexDirection = 'column';
      item.style.alignItems = 'stretch';
      item.innerHTML = `
        <div class="post-meta">
          <p class="post-title">${escapeHtml(sub.title || '(제목 없음)')}<span class="tier-tag ${tier}">${tierLabel(tier)}</span></p>
          <p class="post-sub">${escapeHtml(sub.username)}${sub.author ? ' · 필명: ' + escapeHtml(sub.author) : ''} · ${escapeHtml((sub.submittedAt||'').slice(0,10))}</p>
          <p class="sub-preview">${escapeHtml((sub.content||'').slice(0,200))}${(sub.content||'').length > 200 ? '…' : ''}</p>
        </div>
        <div class="post-actions" style="margin-top:12px;">
          <button class="approve-btn" data-id="${sub.id}">승인 · 발행</button>
          <button class="btn-danger" data-reject="${sub.id}">거절</button>
        </div>
      `;
      submissionList.appendChild(item);
    });
    submissionList.querySelectorAll('.approve-btn').forEach(btn => {
      btn.addEventListener('click', () => handleApprove(btn.dataset.id, btn));
    });
    submissionList.querySelectorAll('[data-reject]').forEach(btn => {
      btn.addEventListener('click', () => handleReject(btn.dataset.reject, btn));
    });
  }catch(err){
    submissionList.innerHTML = `<div class="empty">불러오기 실패 (${err.message})</div>`;
  }
}

function tierLabel(tier){
  if(tier === 'blocked') return '차단';
  if(tier === 'trusted') return '연재작가';
  return '일반';
}

async function handleApprove(subId, btn){
  btn.disabled = true;
  btn.textContent = '처리 중…';
  try{
    await ensureDeviceAuthorized();
    const { list: subs, sha: subsSha } = await fetchSubmissions();
    const sub = subs.find(s => s.id === subId);
    if(!sub){ loadSubmissions(); return; }

    const { list: posts, sha: postsSha } = await fetchPosts();
    posts.push({
      id: (crypto.randomUUID ? crypto.randomUUID() : ('p_' + Date.now())),
      title: sub.title,
      author: sub.author || sub.username,
      content: sub.content,
      room: sub.room || 'outside',
      date: new Date().toISOString().slice(0,10),
      submittedBy: sub.username
    });
    await savePosts(posts, postsSha, `투고 승인: ${sub.title}`);

    const remaining = subs.filter(s => s.id !== subId);
    await saveSubmissions(remaining, subsSha, `투고 승인 처리: ${sub.title}`);

    loadSubmissions();
    loadPosts();
  }catch(err){
    if(err.message !== 'DEVICE_REVOKED'){
      btn.textContent = `실패 (${err.message})`;
      btn.disabled = false;
    }
  }
}

async function handleReject(subId, btn){
  btn.disabled = true;
  btn.textContent = '처리 중…';
  try{
    await ensureDeviceAuthorized();
    const { list: subs, sha } = await fetchSubmissions();
    const sub = subs.find(s => s.id === subId);
    const remaining = subs.filter(s => s.id !== subId);
    await saveSubmissions(remaining, sha, `투고 거절: ${sub ? sub.title : subId}`);
    loadSubmissions();
  }catch(err){
    if(err.message !== 'DEVICE_REVOKED'){
      btn.textContent = `실패 (${err.message})`;
      btn.disabled = false;
    }
  }
}

bulkApproveBtn.addEventListener('click', async () => {
  bulkApproveBtn.disabled = true;
  bulkApproveStatus.textContent = '확인 중…';
  bulkApproveStatus.className = 'status';
  try{
    await ensureDeviceAuthorized();
    const { list: accounts } = await fetchAccounts();
    const trustedUsernames = new Set(accounts.filter(a => a.tier === 'trusted').map(a => a.username));

    const { list: subs, sha: subsSha } = await fetchSubmissions();
    const toApprove = subs.filter(s => trustedUsernames.has(s.username));

    if(toApprove.length === 0){
      bulkApproveStatus.textContent = '연재작가의 대기 중인 투고가 없습니다.';
      bulkApproveStatus.className = 'status';
      return;
    }

    bulkApproveStatus.textContent = '발행 중…';
    const { list: posts, sha: postsSha } = await fetchPosts();
    toApprove.forEach(sub => {
      posts.push({
        id: (crypto.randomUUID ? crypto.randomUUID() : ('p_' + Date.now() + Math.random())),
        title: sub.title,
        author: sub.author || sub.username,
        content: sub.content,
        room: sub.room || 'outside',
        date: new Date().toISOString().slice(0,10),
        submittedBy: sub.username
      });
    });
    await savePosts(posts, postsSha, `연재작가 일괄 발행 (${toApprove.length}건)`);

    const remaining = subs.filter(s => !trustedUsernames.has(s.username));
    await saveSubmissions(remaining, subsSha, `연재작가 투고 일괄 처리`);

    bulkApproveStatus.textContent = `${toApprove.length}건 발행 완료`;
    bulkApproveStatus.className = 'status ok';
    loadSubmissions();
    loadPosts();
  }catch(err){
    if(err.message !== 'DEVICE_REVOKED'){
      bulkApproveStatus.textContent = `실패 (${err.message})`;
      bulkApproveStatus.className = 'status err';
    }
  }finally{
    bulkApproveBtn.disabled = false;
  }
});

// ---------- 계정 관리 ----------

refreshAccountsLink.addEventListener('click', loadAccounts);

async function loadAccounts(){
  accountList.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const { list: accounts } = await fetchAccounts();
    _accountsCache = accounts;
    if(!accounts.length){
      accountList.innerHTML = '<div class="empty">등록된 계정이 없습니다.</div>';
      return;
    }
    accountList.innerHTML = '';
    accounts.forEach((acc, idx) => {
      const item = document.createElement('div');
      item.className = 'post-item';
      item.style.flexDirection = 'column';
      item.style.alignItems = 'stretch';
      item.innerHTML = `
        <div class="post-meta">
          <p class="post-title">${escapeHtml(acc.username)}<span class="tier-tag ${acc.tier}">${tierLabel(acc.tier)}</span></p>
          <p class="post-sub">가입일 ${escapeHtml((acc.createdAt||'').slice(0,10))}</p>
        </div>
        <div class="tier-btn-row">
          <button class="tier-btn ${acc.tier === 'blocked' ? 'active' : ''}" data-idx="${idx}" data-tier="blocked">차단</button>
          <button class="tier-btn ${acc.tier === 'normal' ? 'active' : ''}" data-idx="${idx}" data-tier="normal">일반(승인제)</button>
          <button class="tier-btn ${acc.tier === 'trusted' ? 'active' : ''}" data-idx="${idx}" data-tier="trusted">연재작가</button>
          <button class="btn-danger" data-delete-idx="${idx}">계정 삭제</button>
        </div>
      `;
      accountList.appendChild(item);
    });
    accountList.querySelectorAll('.tier-btn').forEach(btn => {
      btn.addEventListener('click', () => changeTier(Number(btn.dataset.idx), btn.dataset.tier, btn));
    });
    accountList.querySelectorAll('[data-delete-idx]').forEach(btn => {
      btn.addEventListener('click', () => deleteAccount(Number(btn.dataset.deleteIdx), btn));
    });
  }catch(err){
    accountList.innerHTML = `<div class="empty">불러오기 실패 (${err.message})</div>`;
  }
}

async function changeTier(idx, newTier, btn){
  const row = btn.closest('.post-item');
  row.querySelectorAll('.tier-btn').forEach(b => b.disabled = true);
  try{
    await ensureDeviceAuthorized();
    const { list: accounts, sha } = await fetchAccounts();
    if(!accounts[idx]) { loadAccounts(); return; }
    accounts[idx].tier = newTier;
    await saveAccounts(accounts, sha, `계정 티어 변경: ${accounts[idx].username} → ${newTier}`);
    loadAccounts();
  }catch(err){
    if(err.message !== 'DEVICE_REVOKED'){
      row.querySelectorAll('.tier-btn').forEach(b => b.disabled = false);
    }
  }
}

async function deleteAccount(idx, btn){
  if(btn.closest('.post-item').querySelector('.confirm-box')) return;
  const box = document.createElement('div');
  box.className = 'confirm-box';
  box.innerHTML = `
    이 계정을 완전히 삭제할까요? 되돌릴 수 없습니다.
    <div class="confirm-actions">
      <button class="btn-danger" id="confirm-yes">삭제 확정</button>
      <button class="btn-cancel" id="confirm-no">취소</button>
    </div>
  `;
  btn.closest('.post-item').appendChild(box);
  box.querySelector('#confirm-no').addEventListener('click', () => box.remove());
  box.querySelector('#confirm-yes').addEventListener('click', async () => {
    box.innerHTML = '삭제 중…';
    try{
      await ensureDeviceAuthorized();
      const { list: accounts, sha } = await fetchAccounts();
      if(!accounts[idx]){ loadAccounts(); return; }
      const removed = accounts[idx];
      accounts.splice(idx, 1);
      await saveAccounts(accounts, sha, `계정 삭제: ${removed.username}`);
      loadAccounts();
    }catch(err){
      if(err.message !== 'DEVICE_REVOKED'){
        box.innerHTML = `삭제 실패 (${err.message})`;
      }
    }
  });
}

// ---------- 공통 ----------

function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
