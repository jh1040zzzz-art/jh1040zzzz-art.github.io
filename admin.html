<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 결핍과 문학</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f1ea;
    --ink:#1c1a17;
    --accent:#9c3b2e;
    --accent-soft:#c96b57;
    --line:#d8d1c2;
    --card:#fffdf8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Serif KR', serif;
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(0,0,0,0.02) 0%, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(0,0,0,0.02) 0%, transparent 40%);
    color:var(--ink);
    line-height:1.7;
  }
  header{
    padding:48px 24px 24px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:'Nanum Myeongjo', serif;
    font-weight:800;
    font-size:28px;
    letter-spacing:2px;
    margin:0 0 6px;
  }
  header p{
    margin:0;
    font-size:13px;
    color:#7a7568;
    letter-spacing:1px;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  section{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:2px;
    padding:28px 24px;
    margin-bottom:28px;
    box-shadow:0 1px 2px rgba(0,0,0,0.03);
  }
  section h2{
    font-family:'Nanum Myeongjo', serif;
    font-size:17px;
    margin:0 0 18px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:8px;
  }
  section h2::before{
    content:"";
    width:6px;
    height:6px;
    background:var(--accent);
    display:inline-block;
    border-radius:50%;
  }
  label{
    display:block;
    font-size:13px;
    color:#5c584d;
    margin:14px 0 6px;
  }
  input[type="text"], input[type="password"], textarea, select{
    width:100%;
    padding:10px 12px;
    font-family:'Noto Serif KR', serif;
    font-size:14px;
    border:1px solid var(--line);
    border-radius:2px;
    background:#fff;
    color:var(--ink);
  }
  textarea{
    min-height:180px;
    resize:vertical;
  }
  button{
    font-family:'Nanum Myeongjo', serif;
    font-size:14px;
    border:none;
    border-radius:2px;
    padding:11px 20px;
    cursor:pointer;
    letter-spacing:1px;
  }
  .btn-primary{
    background:var(--accent);
    color:#fff;
    margin-top:20px;
  }
  .btn-primary:hover{ background:#82301f; }
  .btn-primary:disabled{ background:#b79b95; cursor:not-allowed; }
  .btn-danger{
    background:transparent;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:6px 12px;
    font-size:12px;
  }
  .btn-danger:hover{ background:var(--accent); color:#fff; }
  .btn-secondary{
    background:transparent;
    color:#5c584d;
    border:1px solid var(--line);
    padding:6px 12px;
    font-size:12px;
  }
  .token-row{
    display:flex;
    gap:8px;
  }
  .token-row input{ flex:1; }
  .status{
    font-size:12px;
    margin-top:10px;
    color:#7a7568;
  }
  .status.ok{ color:#3a6b3f; }
  .status.err{ color:var(--accent); }
  .post-item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    padding:14px 0;
    border-bottom:1px solid var(--line);
  }
  .post-item:last-child{ border-bottom:none; }
  .post-meta{ flex:1; min-width:0; }
  .post-title{
    font-weight:600;
    font-size:15px;
    margin:0 0 4px;
    word-break:break-word;
  }
  .post-sub{
    font-size:12px;
    color:#8a8577;
  }
  .post-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }
  .empty{
    text-align:center;
    color:#9a9587;
    font-size:13px;
    padding:20px 0;
  }
  .confirm-box{
    background:#fbf1ee;
    border:1px solid var(--accent-soft);
    padding:14px;
    border-radius:2px;
    margin-top:10px;
    font-size:13px;
  }
  .confirm-box .confirm-actions{
    margin-top:10px;
    display:flex;
    gap:8px;
  }
  .locked{
    text-align:center;
    padding:60px 20px;
    color:#8a8577;
    font-size:13px;
  }
  .refresh-link{
    font-size:12px;
    color:var(--accent);
    cursor:pointer;
    text-decoration:underline;
  }
</style>
</head>
<body>

<header>
  <h1>결핍과 문학 · 관리자</h1>
  <p>글 발행 및 삭제</p>
</header>

<main>

  <!-- 토큰 입력 -->
  <section id="token-section">

    <div class="status" id="token-status"></div>
  </section>

  <!-- 글쓰기 -->
  <section>
    <h2>새 글 작성</h2>

    <input type="text" id="post-title" placeholder="글 제목">

    <label for="post-author">글쓴이</label>

    <select id="post-target">
      <option value="secret">공식 간행물 외</option>
    </select>

    <label for="post-content">내용</label>
    <textarea id="post-content" placeholder="글 내용을 입력하세요"></textarea>

    <button class="btn-primary" id="publish-btn">발행하기</button>
    <div class="status" id="publish-status"></div>
  </section>

  <!-- 글 목록 / 삭제 -->
  <section>
    <h2>발행된 글 관리 <span class="refresh-link" id="refresh-link" style="margin-left:auto; font-weight:400;">새로고침</span></h2>
    <div id="post-list">
      <div class="empty">불러오는 중…</div>
    </div>
  </section>

</main>

function getToken(){
  return localStorage.getItem('gh_pat') || '';
}

function setTokenStatus(msg, ok){
  tokenStatus.textContent = msg;
  tokenStatus.className = 'status ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
}

// 저장된 토큰 불러오기
window.addEventListener('DOMContentLoaded', () => {
  const saved = getToken();
  if(saved){
    patInput.value = saved;
    setTokenStatus('저장된 토큰을 사용합니다.', true);
  }
  loadPosts();
});

saveTokenBtn.addEventListener('click', () => {
  const val = patInput.value.trim();
  if(!val){ setTokenStatus('토큰을 입력해주세요.', false); return; }
  localStorage.setItem('gh_pat', val);
  setTokenStatus('토큰이 저장되었습니다.', true);
  loadPosts();
});

refreshLink.addEventListener('click', loadPosts);

// posts.json 불러오기 (내용 + sha)
async function fetchPostsFile(){
  const token = getToken();
  if(!token) throw new Error('NO_TOKEN');

  const res = await fetch(API_BASE, {
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github+json'
    }
  });
  if(!res.ok) throw new Error('FETCH_FAILED_' + res.status);

  const data = await res.json();
  const content = decodeURIComponent(escape(atob(data.content)));
  const posts = JSON.parse(content || '[]');
  return { posts, sha: data.sha };
}

// posts.json 저장 (덮어쓰기)
async function savePostsFile(posts, sha, message){
  const token = getToken();
  if(!token) throw new Error('NO_TOKEN');

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2))));

  const res = await fetch(API_BASE, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github+json'
    },
    body: JSON.stringify({
      message: message,
      content: encoded,
      sha: sha
    })
  });
  if(!res.ok) throw new Error('SAVE_FAILED_' + res.status);
  return res.json();
}
