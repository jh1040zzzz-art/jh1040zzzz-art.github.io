<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결핍과 문학</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --paper: #efe9df; --ink: #1c1a17; --ink-soft: #4a453e; --void: #0e0d0b; --gap-red: #9c3b2e; }
  body { background: var(--void); color: var(--paper); font-family: 'Noto Serif KR', serif; min-height: 100vh; }

  #lock-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8vw;
    text-align: center;
  }
  #lock-screen h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.5rem;
    margin-bottom: 2rem;
  }
  #lock-screen input {
    width: 100%;
    max-width: 280px;
    padding: 0.8rem 1rem;
    background: transparent;
    border: 1px solid rgba(239,233,223,0.4);
    color: var(--paper);
    font-size: 1rem;
    text-align: center;
    outline: none;
    font-family: 'Noto Serif KR', serif;
  }
  #lock-screen input:focus { border-color: var(--gap-red); }
  #lock-screen button {
    margin-top: 1.2rem;
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid var(--paper);
    color: var(--paper);
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  #lock-screen button:hover { background: var(--paper); color: var(--void); }
  #error-msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--gap-red);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  #error-msg.show { opacity: 1; }

  #content {
    display: none;
    max-width: 760px;
    margin: 0 auto;
    padding: 10vh 8vw;
  }
  #content.show { display: block; }
  #content h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 2rem;
    margin-bottom: 0.8rem;
  }
  #content .sub {
    font-weight: 300;
    font-size: 0.95rem;
    color: rgba(239,233,223,0.55);
    margin-bottom: 3rem;
  }
  #content p {
    font-weight: 300;
    line-height: 1.8;
    color: rgba(239,233,223,0.85);
  }

  .entry-list {
    margin-top: 1rem;
  }
  .entry-box {
    padding: 2rem 1.6rem;
    margin-bottom: 1.2rem;
    border: 1px dashed rgba(239,233,223,0.2);
    color: rgba(239,233,223,0.35);
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.95rem;
    text-align: center;
  }

  .post-card {
    padding: 1.6rem;
    margin-bottom: 1rem;
    border: 1px solid rgba(239,233,223,0.15);
    cursor: pointer;
    transition: border-color 0.25s ease;
  }
  .post-card:hover { border-color: var(--gap-red); }
  .post-card .p-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.1rem;
    color: var(--paper);
  }
  .post-card .p-meta {
    font-size: 0.8rem;
    color: rgba(239,233,223,0.45);
    margin-top: 0.3rem;
  }
</style>
</head>
<body>

<div id="lock-screen">
  <h1>비공개 페이지</h1>
  <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="off">
  <br>
  <button onclick="checkPassword()">입장</button>
  <div id="error-msg">비밀번호가 틀렸습니다</div>
</div>

<div id="content">
  <h1>공식 간행물 외 입니다.</h1>
  <p class="sub">여기 실리는 글은 정식 월호에 포함되지 않습니다.</p>
  <div class="entry-list" id="entry-list">
    <div class="entry-box">불러오는 중...</div>
  </div>
</div>

<script>
  const PASSWORD = "howdidyouknow";

  function checkPassword() {
    const input = document.getElementById('pw-input').value;
    if (input === PASSWORD) {
      sessionStorage.setItem('gyeolmun_auth', '1');
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('content').classList.add('show');
      loadEntries();
    } else {
      document.getElementById('error-msg').classList.add('show');
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function loadEntries() {
    fetch('posts.json?_=' + Date.now())
      .then(r => r.json())
      .then(posts => {
        const filtered = posts
          .map((p, idx) => ({ ...p, _idx: idx }))
          .filter(p => p.room === 'outside')
          .reverse();
        const el = document.getElementById('entry-list');
        if (filtered.length === 0) {
          el.innerHTML = '<div class="entry-box">아직 실린 글이 없습니다</div>';
          return;
        }
        el.innerHTML = '';
        filtered.forEach(p => {
          const div = document.createElement('div');
          div.className = 'post-card';
          const authorLine = p.author ? (p.author + ' · ') : '';
          div.innerHTML = `
            <div class="p-title">${escapeHtml(p.title)}</div>
            <div class="p-meta">${authorLine}${p.date || ''}</div>
          `;
          const key = p.id ? encodeURIComponent(p.id) : p._idx;
          const paramName = p.id ? 'id' : 'index';
          div.addEventListener('click', () => {
            window.location.href = `post.html?${paramName}=${key}`;
          });
          el.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('entry-list').innerHTML = '<div class="entry-box">불러오기 실패</div>';
      });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
