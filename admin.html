<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 결핍과 문학</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0c0a;
    --ink:#ece7db;
    --sub:#8f8a7c;
    --accent:#9c3b2e;
    --accent-soft:#c96b57;
    --line:#3a352c;
    --field-bg:#1a1712;
    --field-border:#3a352c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Serif KR', serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.7;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:48px 24px 100px;
  }
  h1{
    font-family:'Nanum Myeongjo', serif;
    font-weight:800;
    font-size:30px;
    margin:0 0 12px;
  }
  .warning{
    color:var(--sub);
    font-size:14px;
    margin:0 0 40px;
  }
  .token-box{
    border:1px dashed var(--line);
    padding:24px;
    margin-bottom:44px;
  }
  .token-box p{
    color:var(--ink);
    font-size:15px;
    margin:0 0 18px;
  }
  label{
    display:block;
    font-size:15px;
    color:var(--ink);
    margin:0 0 10px;
  }
  label.optional::after{
    content:" (선택)";
    color:var(--sub);
    font-size:13px;
  }
  input[type="text"], input[type="password"], textarea, select{
    width:100%;
    padding:14px 16px;
    font-family:'Noto Serif KR', serif;
    font-size:15px;
    border:1px solid var(--field-border);
    border-radius:2px;
    background:var(--field-bg);
    color:var(--ink);
  }
  input::placeholder, textarea::placeholder{
    color:#6a6558;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  textarea{
    min-height:260px;
    resize:vertical;
  }
  .field{
    margin-bottom:28px;
  }
  select{
    appearance:none;
    -webkit-appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sub) 50%), linear-gradient(135deg, var(--sub) 50%, transparent 50%);
    background-position: calc(100% - 20px) center, calc(100% - 15px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
  }
  button{
    font-family:'Nanum Myeongjo', serif;
    font-size:16px;
    border:none;
    border-radius:2px;
    padding:16px 28px;
    cursor:pointer;
  }
  .btn-save{
    background:var(--accent);
    color:#fff;
  }
  .btn-save:hover{ background:#82301f; }
  .btn-publish{
    background:var(--accent);
    color:#fff;
    width:100%;
    padding:18px;
    font-size:17px;
    margin-top:8px;
  }
  .btn-publish:hover{ background:#82301f; }
  .btn-publish:disabled{ background:#5a2d26; cursor:not-allowed; }
  .status{
    font-size:14px;
    margin-top:14px;
  }
  .status.ok{ color:#7fae7f; }
  .status.err{ color:var(--accent-soft); }
  .divider{
    border:none;
    border-top:1px solid var(--line);
    margin:56px 0 32px;
  }
  .list-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .list-header h2{
    font-family:'Nanum Myeongjo', serif;
    font-size:17px;
    font-weight:700;
    margin:0;
  }
  .refresh-link{
    font-size:13px;
    color:var(--sub);
    cursor:pointer;
    text-decoration:underline;
  }
  .refresh-link:hover{ color:var(--ink); }
  .empty{
    color:var(--sub);
    font-size:15px;
  }
  .post-item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    padding:18px 0;
    border-bottom:1px solid var(--line);
  }
  .post-item:last-child{ border-bottom:none; }
  .post-meta{ flex:1; min-width:0; }
  .post-title{
    font-weight:600;
    font-size:16px;
    margin:0 0 6px;
    word-break:break-word;
    color:var(--ink);
  }
  .post-sub{
    font-size:13px;
    color:var(--sub);
  }
  .post-actions{
    flex-shrink:0;
  }
  .btn-danger{
    background:transparent;
    color:var(--accent-soft);
    border:1px solid var(--accent-soft);
    padding:8px 14px;
    font-size:13px;
  }
  .btn-danger:hover{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-cancel{
    background:transparent;
    color:var(--sub);
    border:1px solid var(--line);
    padding:8px 14px;
    font-size:13px;
  }
  .btn-cancel:hover{ border-color:var(--sub); color:var(--ink); }
  .confirm-box{
    background:#1e1512;
    border:1px solid var(--accent);
    padding:16px;
    border-radius:2px;
    margin-top:12px;
    font-size:14px;
    color:var(--ink);
  }
  .confirm-box .confirm-actions{
    margin-top:12px;
    display:flex;
    gap:10px;
  }
  .token-row{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .token-row input{ flex:1; }
</style>
</head>
<body>

<main>
  <h1>관리자 · 글쓰기</h1>
  <p class="warning">이 페이지 주소는 아무에게도 공유하지 마세요.</p>

  <!-- 토큰 입력 -->
  <div class="token-box">
    <p>최초 1회, GitHub Personal Access Token을 입력하세요. 이 브라우저에만 저장되며 서버로 전송되지 않습니다.</p>
    <div class="token-row">
      <input type="password" id="pat-input" placeholder="ghp_...">
    </div>
    <div style="margin-top:16px;">
      <button class="btn-save" id="save-token-btn">저장</button>
    </div>
    <div class="status" id="token-status"></div>
  </div>

  <!-- 글쓰기 -->
  <div class="field">
    <label for="post-target">올릴 곳</label>
    <select id="post-target">
      <option value="secret">공식 간행물 외</option>
    </select>
  </div>

  <div class="field">
    <label for="post-title">제목</label>
    <input type="text" id="post-title" placeholder="글 제목">
  </div>

  <div class="field">
    <label for="post-author" class="optional">글쓴이</label>
    <input type="text" id="post-author" placeholder="이름 또는 필명">
  </div>

  <div class="field">
    <label for="post-content">내용</label>
    <textarea id="post-content" placeholder="여기에 글을 붙여넣거나 작성하세요"></textarea>
  </div>

  <button class="btn-publish" id="publish-btn">발행하기</button>
  <div class="status" id="publish-status"></div>

  <hr class="divider">

  <!-- 글 목록 / 삭제 -->
  <div class="list-header">
    <h2>발행된 글</h2>
    <span class="refresh-link" id="refresh-link">새로고침</span>
  </div>
  <div id="post-list">
    <div class="empty">불러오는 중…</div>
  </div>
</main>

<script>
const REPO_OWNER = "jh1040zzzz-art";
const REPO_NAME = "jh1040zzzz-art.github.io";
const FILE_PATH = "posts.json";
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

const patInput = document.getElementById('pat-input');
const tokenStatus = document.getElementById('token-status');
const saveTokenBtn = document.getElementById('save-token-btn');
const postList = document.getElementById('post-list');
const refreshLink = document.getElementById('refresh-link');
const publishBtn = document.getElementById('publish-btn');
const publishStatus = document.getElementById('publish-status');

function getToken(){
  return localStorage.getItem('gh_pat') || '';
}

function setTokenStatus(msg, ok){
  tokenStatus.textContent = msg;
  tokenStatus.className = 'status ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = getToken();
  if(saved){
    patInput.value = saved;
    setTokenStatus('저장됨', true);
  }
  loadPosts();
});

saveTokenBtn.addEventListener('click', () => {
  const val = patInput.value.trim();
  if(!val){ setTokenStatus('토큰을 입력해주세요.', false); return; }
  localStorage.setItem('gh_pat', val);
  setTokenStatus('저장됨', true);
  loadPosts();
});

refreshLink.addEventListener('click', loadPosts);

async function fetchPostsFile(){
  const token = getToken();
  if(!token) throw new Error('NO_TOKEN');

  const res = await fetch(API_BASE, {
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github+json'
    }
  });
  if(!res.ok) throw new Error('FETCH_FAILED_' + res.status);

  const data = await res.json();
  const content = decodeURIComponent(escape(atob(data.content)));
  const posts = JSON.parse(content || '[]');
  return { posts, sha: data.sha };
}

async function savePostsFile(posts, sha, message){
  const token = getToken();
  if(!token) throw new Error('NO_TOKEN');

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2))));

  const res = await fetch(API_BASE, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github+json'
    },
    body: JSON.stringify({
      message: message,
      content: encoded,
      sha: sha
    })
  });
  if(!res.ok) throw new Error('SAVE_FAILED_' + res.status);
  return res.json();
}

async function loadPosts(){
  const token = getToken();
  if(!token){
    postList.innerHTML = '<div class="empty">토큰을 먼저 저장해주세요.</div>';
    return;
  }
  postList.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const { posts } = await fetchPostsFile();
    if(!posts.length){
      postList.innerHTML = '<div class="empty">아직 올린 글이 없습니다.</div>';
      return;
    }
    postList.innerHTML = '';
    posts.slice().reverse().forEach((post) => {
      const originalIndex = posts.indexOf(post);
      const item = document.createElement('div');
      item.className = 'post-item';
      item.innerHTML = `
        <div class="post-meta">
          <p class="post-title">${escapeHtml(post.title || '(제목 없음)')}</p>
          <p class="post-sub">${escapeHtml(post.author || '익명')} · ${escapeHtml(post.date || '')}</p>
        </div>
        <div class="post-actions">
          <button class="btn-danger" data-index="${originalIndex}">삭제</button>
        </div>
      `;
      postList.appendChild(item);
    });

    postList.querySelectorAll('.btn-danger').forEach(btn => {
      btn.addEventListener('click', () => confirmDelete(btn));
    });
  }catch(err){
    if(err.message === 'NO_TOKEN'){
      postList.innerHTML = '<div class="empty">토큰을 먼저 저장해주세요.</div>';
    }else{
      postList.innerHTML = `<div class="empty">불러오기 실패 (${err.message}). 토큰 권한을 확인해주세요.</div>`;
    }
  }
}

function confirmDelete(btn){
  if(btn.closest('.post-item').querySelector('.confirm-box')) return;

  const box = document.createElement('div');
  box.className = 'confirm-box';
  box.innerHTML = `
    정말 이 글을 삭제할까요? 이 작업은 되돌릴 수 없습니다.
    <div class="confirm-actions">
      <button class="btn-danger" id="confirm-yes">삭제 확정</button>
      <button class="btn-cancel" id="confirm-no">취소</button>
    </div>
  `;
  btn.closest('.post-item').appendChild(box);

  box.querySelector('#confirm-no').addEventListener('click', () => box.remove());
  box.querySelector('#confirm-yes').addEventListener('click', () => deletePost(btn.dataset.index, box));
}

async function deletePost(index, box){
  box.innerHTML = '삭제 중…';
  try{
    const { posts, sha } = await fetchPostsFile();
    const idx = Number(index);
    if(idx < 0 || idx >= posts.length){
      box.innerHTML = '이미 삭제되었거나 목록이 변경되었습니다. 새로고침 해주세요.';
      return;
    }
    const removedTitle = posts[idx].title || '(제목 없음)';
    posts.splice(idx, 1);
    await savePostsFile(posts, sha, `삭제: ${removedTitle}`);
    loadPosts();
  }catch(err){
    box.innerHTML = `삭제 실패 (${err.message}). 다시 시도해주세요.`;
  }
}

publishBtn.addEventListener('click', async () => {
  const title = document.getElementById('post-title').value.trim();
  const author = document.getElementById('post-author').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const target = document.getElementById('post-target').value;

  if(!title || !content){
    publishStatus.textContent = '제목과 내용을 입력해주세요.';
    publishStatus.className = 'status err';
    return;
  }

  publishBtn.disabled = true;
  publishStatus.textContent = '발행 중…';
  publishStatus.className = 'status';

  try{
    const { posts, sha } = await fetchPostsFile();
    const newPost = {
      title,
      author: author || '익명',
      content,
      target,
      date: new Date().toISOString().slice(0,10)
    };
    posts.push(newPost);
    await savePostsFile(posts, sha, `발행: ${title}`);

    publishStatus.textContent = '발행되었습니다.';
    publishStatus.className = 'status ok';
    document.getElementById('post-title').value = '';
    document.getElementById('post-author').value = '';
    document.getElementById('post-content').value = '';
    loadPosts();
  }catch(err){
    publishStatus.textContent = `발행 실패 (${err.message})`;
    publishStatus.className = 'status err';
  }finally{
    publishBtn.disabled = false;
  }
});

function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>

</body>
</html>
